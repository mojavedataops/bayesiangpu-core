name: R Package

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'r-package/**'
      - 'crates/bayesian-core/**'
      - 'crates/bayesian-sampler/**'
      - 'crates/bayesian-diagnostics/**'
      - 'crates/bayesian-rng/**'
  pull_request:
    branches: [main]
    paths:
      - 'r-package/**'
      - 'crates/bayesian-core/**'
      - 'crates/bayesian-sampler/**'
      - 'crates/bayesian-diagnostics/**'
      - 'crates/bayesian-rng/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  R-CMD-check-linux:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel', http-user-agent: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r-package/bayesiangpu
          extra-packages: any::rcmdcheck
          needs: check

      - name: Vendor workspace crates for R CMD check
        run: |
          mkdir -p r-package/bayesiangpu/src/rust/crates
          cp -r crates/bayesian-core r-package/bayesiangpu/src/rust/crates/
          cp -r crates/bayesian-sampler r-package/bayesiangpu/src/rust/crates/
          cp -r crates/bayesian-diagnostics r-package/bayesiangpu/src/rust/crates/
          cp -r crates/bayesian-rng r-package/bayesiangpu/src/rust/crates/
          # Patch R package Cargo.toml to use vendored crate paths
          CARGO_TOML=r-package/bayesiangpu/src/rust/Cargo.toml
          sed 's|path = "../../../../crates/|path = "./crates/|g' "$CARGO_TOML" > "$CARGO_TOML.tmp"
          mv "$CARGO_TOML.tmp" "$CARGO_TOML"
          # Inline workspace references in vendored crate Cargo.tomls
          for f in r-package/bayesiangpu/src/rust/crates/*/Cargo.toml; do
            sed \
              -e 's/^version\.workspace = true$/version = "0.1.0"/' \
              -e 's/^edition\.workspace = true$/edition = "2021"/' \
              -e 's/^license\.workspace = true$/license = "MIT"/' \
              -e '/^burn-autodiff/s/workspace = true/version = "0.20"/' \
              -e '/^burn-wgpu/s/workspace = true/version = "0.20", default-features = false/' \
              -e '/^burn /s/workspace = true/version = "0.20", default-features = false/' \
              -e '/^serde_json/s/workspace = true/version = "1.0"/' \
              -e '/^serde /s/workspace = true/version = "1.0", features = ["derive"]/' \
              "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: r-package/bayesiangpu
          upload-snapshots: true
          args: 'c("--no-manual", "--no-tests", "--as-cran")'
          error-on: '"error"'

  R-CMD-check-cross-platform:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r-package/bayesiangpu
          extra-packages: any::rcmdcheck
          needs: check

      - name: Vendor workspace crates for R CMD check
        shell: bash
        run: |
          mkdir -p r-package/bayesiangpu/src/rust/crates
          cp -r crates/bayesian-core r-package/bayesiangpu/src/rust/crates/
          cp -r crates/bayesian-sampler r-package/bayesiangpu/src/rust/crates/
          cp -r crates/bayesian-diagnostics r-package/bayesiangpu/src/rust/crates/
          cp -r crates/bayesian-rng r-package/bayesiangpu/src/rust/crates/
          # Patch R package Cargo.toml to use vendored crate paths
          CARGO_TOML=r-package/bayesiangpu/src/rust/Cargo.toml
          sed 's|path = "../../../../crates/|path = "./crates/|g' "$CARGO_TOML" > "$CARGO_TOML.tmp"
          mv "$CARGO_TOML.tmp" "$CARGO_TOML"
          # Inline workspace references in vendored crate Cargo.tomls
          for f in r-package/bayesiangpu/src/rust/crates/*/Cargo.toml; do
            sed \
              -e 's/^version\.workspace = true$/version = "0.1.0"/' \
              -e 's/^edition\.workspace = true$/edition = "2021"/' \
              -e 's/^license\.workspace = true$/license = "MIT"/' \
              -e '/^burn-autodiff/s/workspace = true/version = "0.20"/' \
              -e '/^burn-wgpu/s/workspace = true/version = "0.20", default-features = false/' \
              -e '/^burn /s/workspace = true/version = "0.20", default-features = false/' \
              -e '/^serde_json/s/workspace = true/version = "1.0"/' \
              -e '/^serde /s/workspace = true/version = "1.0", features = ["derive"]/' \
              "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: r-package/bayesiangpu
          upload-snapshots: true
          args: 'c("--no-manual", "--no-tests", "--as-cran")'
          error-on: '"error"'

  pkgdown:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: R-CMD-check-linux
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r-package/bayesiangpu
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build pkgdown site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}
        working-directory: r-package/bayesiangpu

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: r-package/bayesiangpu/docs
          target-folder: r
